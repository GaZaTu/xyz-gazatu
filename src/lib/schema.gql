  questions: Float!
  questionsNotVerified: Float!
  reports: Float!
}

input TriviaCategoryInput {
  id: String
  name: String!
  description: String
  submitter: String
}

input TriviaQuestionInput {
  id: String
  question: String!
  answer: String!
  hint1: String
  hint2: String
  submitter: String

  """public"""
