}

input TriviaReportInput {
  id: String
  questionId: String!
  message: String!
  submitter: String!
}

type UserListConnection {
  slice: [User!]!
  pageIndex: Float!
  pageCount: Float!
}

input ListUsersArgs {
  window: Window
  search: String
  sorting: Sorting
}

type UserPasskey {
  id: String!
  userId: String!
  name: String!
  transports: String
  counter: Float!
  backedUp: Boolean!
